<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light">

    <h1>Hello, world!</h1>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="container my-5">
        <h1 class="text-center mb-4">Bootstrap Carousel Examples</h1>
        <!-- first row is one carousel -->
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="text-center mb-4">Full Width Carousel</h2>
                <div id="carouselExample" class="carousel slide">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/beagle.jpg" class="d-block w-100 img-fluid" alt="beagle">
                        </div>
                        <div class="carousel-item">
                            <img src="img/cockatiel.jpg" class="d-block w-100 img-fluid" alt="cockatiel">
                        </div>
                        <div class="carousel-item">
                            <img src="img/golden.jpg" class="d-block w-100 img-fluid" alt="golden">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-6">
                <h2 class="text-center mb-4">Bird Carousel</h2>
                <div id="carousel2" class="carousel slide">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/lovebird.jpg" class="d-block w-100 img-fluid" alt="love bird">
                        </div>
                        <div class="carousel-item">
                            <img src="img/cockatiel.jpg" class="d-block w-100 img-fluid" alt="cockatiel">
                        </div>
                        <div class="carousel-item">
                            <img src="img/parakeet.jpg" class="d-block w-100 img-fluid" alt="parakeet">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carousel2"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carousel2"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>

            </div>

            <div class="col-6">
                <h2 class="text-center mb-4">Cat Carousel</h2>
                <div id="carousel3" class="carousel slide">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/orange.jpg" class="d-block w-100 img-fluid" alt="orange">
                            <div class="carousel-caption d-none d-md-block">Orange cat</div>
                        </div>
                        <div class="carousel-item">
                            <img src="img/siamese.jpg" class="d-block w-100 img-fluid" alt="siamese">
                            <div class="carousel-caption d-none d-md-block">Siamese Cat</div>
                        </div>
                        <div class="carousel-item">
                            <img src="img/tabby.jpg" class="d-block w-100 img-fluid" alt="tabby">
                            <div class="carousel-caption d-none d-md-block">Tabby cat</div>
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carousel3"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carousel3"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-3">
                <h2 class="text-center mb-4">Small Dog Carousel</h2>
                <div id="carousel4" class="carousel slide-fade">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/beagle.jpg" class="d-block w-100 img-fluid" alt="beagle">
                        </div>
                        <div class="carousel-item">
                            <img src="img/golden.jpg" class="d-block w-100 img-fluid" alt="golden">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carousel4"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carousel4"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
